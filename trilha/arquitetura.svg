<svg viewBox="0 0 1100 500" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d98a4f"/><stop offset="1" stop-color="#b5651d"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"/><stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4c531"/><stop offset="1" stop-color="#d9a006"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1100" height="500" fill="url(#bg)" rx="12"/>
  <text x="550" y="34" fill="#e2e8f0" font-size="19" font-weight="700" text-anchor="middle">Arquitetura Medalhão — Pipeline Câmara dos Deputados</text>
  <text x="550" y="54" fill="#94a3b8" font-size="12" text-anchor="middle">API → Bronze → Prata → Ouro → Consumo · Databricks + Delta + Unity Catalog</text>

  <!-- connection paths -->
  <path id="p1" d="M185,250 L360,250" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path id="p2" d="M512,250 L560,250" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path id="p3" d="M712,250 L760,250" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path id="p4" d="M912,250 L965,250" stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path id="pv" d="M275,395 C320,395 330,320 380,300" stroke="#475569" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)"/>

  <text x="272" y="240" fill="#94a3b8" font-size="10.5" text-anchor="middle">coleta agendada</text>
  <text x="272" y="253" fill="#94a3b8" font-size="10.5" text-anchor="middle">(fora do cluster)</text>

  <!-- Lakehouse container -->
  <rect x="338" y="120" width="600" height="270" rx="14" fill="#0b1220" stroke="#334155" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="638" y="146" fill="#7dd3fc" font-size="13" font-weight="600" text-anchor="middle">Lakehouse — Databricks · Delta · Unity Catalog</text>

  <!-- Source -->
  <g filter="url(#glow)">
    <rect x="35" y="205" width="150" height="90" rx="10" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  </g>
  <text x="110" y="240" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">API Dados Abertos</text>
  <text x="110" y="258" fill="#cbd5e1" font-size="11" text-anchor="middle">Câmara dos</text>
  <text x="110" y="273" fill="#cbd5e1" font-size="11" text-anchor="middle">Deputados</text>

  <!-- Volume cylinder -->
  <g>
    <ellipse cx="222" cy="380" rx="52" ry="13" fill="#334155" stroke="#64748b"/>
    <rect x="170" y="380" width="104" height="40" fill="#334155" stroke="#64748b"/>
    <ellipse cx="222" cy="420" rx="52" ry="13" fill="#1e293b" stroke="#64748b"/>
    <ellipse cx="222" cy="380" rx="52" ry="13" fill="#475569" stroke="#64748b"/>
  </g>
  <text x="222" y="385" fill="#e2e8f0" font-size="11" font-weight="600" text-anchor="middle">Volume UC</text>
  <text x="222" y="408" fill="#cbd5e1" font-size="10" text-anchor="middle">raw files</text>

  <!-- Bronze -->
  <rect x="362" y="195" width="150" height="110" rx="10" fill="url(#bronze)"/>
  <rect x="362" y="195" width="150" height="110" rx="10" fill="none" stroke="#f8d8b8" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="437" y="232" fill="#fff" font-size="15" font-weight="800" text-anchor="middle">🟫 BRONZE</text>
  <text x="437" y="254" fill="#fff8f0" font-size="10.5" text-anchor="middle">JSONL / Delta cru</text>
  <text x="437" y="270" fill="#fff8f0" font-size="10.5" text-anchor="middle">+ ingest_ts</text>
  <text x="437" y="285" fill="#fff8f0" font-size="10.5" text-anchor="middle">+ source_url</text>

  <!-- Silver -->
  <rect x="562" y="195" width="150" height="110" rx="10" fill="url(#silver)"/>
  <rect x="562" y="195" width="150" height="110" rx="10" fill="none" stroke="#fff" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="637" y="232" fill="#1e293b" font-size="15" font-weight="800" text-anchor="middle">⬜ PRATA</text>
  <text x="637" y="254" fill="#1e293b" font-size="10.5" text-anchor="middle">limpo · tipado</text>
  <text x="637" y="270" fill="#1e293b" font-size="10.5" text-anchor="middle">dedup por PK</text>
  <text x="637" y="285" fill="#1e293b" font-size="10.5" text-anchor="middle">parse de datas</text>

  <!-- Gold -->
  <rect x="762" y="195" width="150" height="110" rx="10" fill="url(#gold)"/>
  <rect x="762" y="195" width="150" height="110" rx="10" fill="none" stroke="#fff4cc" stroke-width="2" opacity="0.6">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="837" y="232" fill="#3b2f00" font-size="15" font-weight="800" text-anchor="middle">🟨 OURO</text>
  <text x="837" y="254" fill="#3b2f00" font-size="10.5" text-anchor="middle">dim_* + fato_*</text>
  <text x="837" y="270" fill="#3b2f00" font-size="10.5" text-anchor="middle">star schema</text>
  <text x="837" y="285" fill="#3b2f00" font-size="10.5" text-anchor="middle">6 entregáveis</text>

  <!-- Consumption -->
  <g filter="url(#glow)">
    <rect x="965" y="205" width="120" height="90" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  </g>
  <text x="1025" y="238" fill="#e2e8f0" font-size="12.5" font-weight="700" text-anchor="middle">Consumo</text>
  <text x="1025" y="258" fill="#cbd5e1" font-size="10" text-anchor="middle">SQL · Dashboards</text>
  <text x="1025" y="273" fill="#cbd5e1" font-size="10" text-anchor="middle">Genie</text>

  <!-- flowing data particles -->
  <g fill="#38bdf8">
    <circle r="4"><animateMotion dur="2s" repeatCount="indefinite" begin="0s"><mpath href="#p1"/></animateMotion></circle>
    <circle r="4" opacity="0.6"><animateMotion dur="2s" repeatCount="indefinite" begin="0.7s"><mpath href="#p1"/></animateMotion></circle>
    <circle r="4" opacity="0.3"><animateMotion dur="2s" repeatCount="indefinite" begin="1.4s"><mpath href="#p1"/></animateMotion></circle>
  </g>
  <g fill="#e2e8f0">
    <circle r="4"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#p2"/></animateMotion></circle>
  </g>
  <g fill="#f4c531">
    <circle r="4"><animateMotion dur="1.2s" repeatCount="indefinite"><mpath href="#p3"/></animateMotion></circle>
  </g>
  <g fill="#34d399">
    <circle r="4"><animateMotion dur="1.6s" repeatCount="indefinite"><mpath href="#p4"/></animateMotion></circle>
  </g>
  <g fill="#94a3b8">
    <circle r="3.5"><animateMotion dur="2.4s" repeatCount="indefinite"><mpath href="#pv"/></animateMotion></circle>
  </g>

  <!-- legend -->
  <text x="550" y="470" fill="#64748b" font-size="11" text-anchor="middle">As partículas representam o fluxo de dados: o cru pousa no Volume → Bronze → é refinado camada a camada até o Ouro → Consumo.</text>
</svg>
